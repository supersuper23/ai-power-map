<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ecosystem Power Map — Interactive</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#e0e0e0;font-family:'JetBrains Mono',monospace;overflow:hidden;height:100vh;width:100vw;}
#header{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 20px;background:linear-gradient(180deg,rgba(8,8,13,0.97) 0%,rgba(8,8,13,0) 100%);display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
#header>*{pointer-events:auto;}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-0.5px;background:linear-gradient(135deg,#ff6b35,#ff3864,#b537f2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
h1 span{display:block;font-size:10px;font-weight:400;font-family:'JetBrains Mono',monospace;-webkit-text-fill-color:#555;margin-top:2px;letter-spacing:1.5px;text-transform:uppercase;}
#legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;max-width:760px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:#666;text-transform:uppercase;letter-spacing:0.5px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-line{width:16px;height:2px;flex-shrink:0;border-radius:1px;}
#search-box{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:150;}
#search-box input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#e0e0e0;padding:7px 16px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:11px;width:220px;outline:none;transition:all 0.3s;}
#search-box input:focus{border-color:#ff6b35;background:rgba(255,255,255,0.08);width:280px;}
#search-box input::placeholder{color:#444;}
#graph{width:100vw;height:100vh;}
#controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;}
.ctrl-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#777;padding:5px 12px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:9px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px;}
.ctrl-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.ctrl-btn.active{background:rgba(255,107,53,0.15);border-color:#ff6b35;color:#ff6b35;}
#detail-panel{position:fixed;top:0;right:-420px;width:400px;height:100vh;z-index:200;background:rgba(12,12,20,0.97);border-left:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(20px);transition:right 0.35s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;padding:0;}
#detail-panel.open{right:0;}
#detail-panel::-webkit-scrollbar{width:4px;}
#detail-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.panel-header{position:relative;padding:24px 24px 20px;border-bottom:1px solid rgba(255,255,255,0.06);}
.panel-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:4px 8px;}
.panel-close:hover{color:#fff;}
.panel-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.1);margin-bottom:12px;background:#1a1a2e;}
.panel-photo.company{border-radius:12px;}
.panel-initials{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:24px;margin-bottom:12px;color:#fff;}
.panel-initials.company{border-radius:12px;}
.panel-name{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;margin-bottom:2px;}
.panel-role{font-size:11px;color:#888;margin-bottom:8px;}
.panel-tier{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.panel-mcap{font-size:11px;color:#aaa;margin-top:4px;}
.panel-section{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.04);}
.panel-section-title{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#ff6b35;margin-bottom:10px;font-weight:700;}
.panel-text{font-size:12px;line-height:1.7;color:#bbb;}
.panel-text strong{color:#e0e0e0;}
.panel-connections{list-style:none;padding:0;}
.panel-connections li{font-size:11px;color:#999;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.02);display:flex;align-items:center;gap:8px;}
.panel-connections li .conn-type{font-size:8px;padding:1px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;}
.panel-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.panel-tag{font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,0.05);color:#999;border:1px solid rgba(255,255,255,0.06);}
#tooltip{position:fixed;display:none;background:rgba(12,12,20,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;font-size:11px;line-height:1.5;max-width:260px;pointer-events:none;z-index:180;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.tt-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#fff;margin-bottom:2px;}
.tt-sub{color:#888;font-size:10px;}
.tt-click{color:#ff6b35;font-size:9px;margin-top:6px;text-transform:uppercase;letter-spacing:1px;}
#stats{position:fixed;bottom:16px;right:16px;z-index:100;font-size:9px;color:#444;text-align:right;}
/* University nodes */
.legend-dot.university{background:#22d3ee;}
/* Path Finder Panel */
#path-finder{position:fixed;top:70px;left:16px;z-index:150;width:280px;background:rgba(12,12,20,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:10px;backdrop-filter:blur(20px);overflow:hidden;}
.pf-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);}
.pf-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:#ff6b35;text-transform:uppercase;letter-spacing:1px;}
.pf-toggle{background:none;border:none;color:#666;font-size:16px;cursor:pointer;padding:0 4px;}
.pf-toggle:hover{color:#fff;}
#pf-body{padding:12px 16px;}
.pf-row{margin-bottom:10px;}
.pf-label{display:block;font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.pf-select{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#e0e0e0;padding:6px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:10px;outline:none;cursor:pointer;}
.pf-select:focus{border-color:#ff6b35;}
.pf-actions{display:flex;gap:8px;margin-bottom:12px;}
.pf-btn{flex:1;background:rgba(255,107,53,0.15);border:1px solid rgba(255,107,53,0.3);color:#ff6b35;padding:6px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.2s;}
.pf-btn:hover{background:rgba(255,107,53,0.3);}
.pf-clear{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:#666;}
.pf-clear:hover{color:#fff;background:rgba(255,255,255,0.1);}
#pf-result{font-size:10px;}
.pf-path-chain{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:8px;}
.pf-node-chip{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:4px;padding:3px 8px;color:#ddd;font-size:9px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.pf-node-chip:hover{background:rgba(255,107,53,0.2);border-color:#ff6b35;color:#ff6b35;}
.pf-hop-arrow{color:#555;font-size:10px;}
.pf-summary{font-size:9px;color:#666;margin-top:6px;}
.pf-no-path{color:#ef5350;font-size:10px;padding:8px 0;}
/* Key Metrics */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.metric-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:8px 10px;}
.metric-val{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:#fff;}
.metric-lbl{font-size:8px;color:#666;text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}
.conn-bars{display:flex;flex-direction:column;gap:4px;}
.conn-bar-row{display:flex;align-items:center;gap:8px;font-size:9px;}
.conn-bar-label{color:#888;width:60px;text-transform:capitalize;flex-shrink:0;}
.conn-bar-track{flex:1;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.conn-bar-fill{height:100%;border-radius:2px;transition:width 0.5s;}
.conn-bar-count{color:#666;width:20px;text-align:right;flex-shrink:0;}
/* News Feed */
.news-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.news-item:last-child{border-bottom:none;}
.news-headline{font-size:11px;color:#ccc;line-height:1.5;margin-bottom:4px;}
.news-meta{display:flex;gap:8px;align-items:center;}
.news-source{font-size:9px;color:#666;}
.news-date{font-size:9px;color:#555;}
.news-tag{font-size:8px;padding:1px 6px;border-radius:3px;background:rgba(255,107,53,0.15);color:#ff6b35;text-transform:uppercase;letter-spacing:0.5px;}
.news-empty{font-size:11px;color:#555;font-style:italic;}
</style>
</head>
<body>
<div id="header">
  <h1>AI Power Map<span>Companies &middot; People &middot; Academia &middot; Power Flows &middot; 2025</span></h1>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b35"></div>S-Tier Co.</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f5a623"></div>Startup</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b537f2"></div>Other Major</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4fc3f7"></div>Person</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22d3ee"></div>University</div>
    <div class="legend-item"><div class="legend-line" style="background:#4a90d9"></div>Funding</div>
    <div class="legend-item"><div class="legend-line" style="background:#66bb6a"></div>Compute</div>
    <div class="legend-item"><div class="legend-line" style="background:#ef5350"></div>Talent</div>
    <div class="legend-item"><div class="legend-line" style="background:#ce93d8"></div>Partner</div>
    <div class="legend-item"><div class="legend-line" style="background:#fbbf24"></div>Academic</div>
    <div class="legend-item"><div class="legend-line" style="background:#f472b6"></div>Mentored</div>
  </div>
</div>
<div id="search-box"><input type="text" id="search" placeholder="Search nodes &amp; tags..." autocomplete="off"></div>
<div id="path-finder">
  <div class="pf-header">
    <span class="pf-title">Path Finder</span>
    <button class="pf-toggle" onclick="togglePathFinder()">&#8722;</button>
  </div>
  <div id="pf-body">
    <div class="pf-row">
      <label class="pf-label">From</label>
      <select id="pf-from" class="pf-select"></select>
    </div>
    <div class="pf-row">
      <label class="pf-label">To</label>
      <select id="pf-to" class="pf-select"></select>
    </div>
    <div class="pf-actions">
      <button class="pf-btn" onclick="runPathFinder()">Find Path</button>
      <button class="pf-btn pf-clear" onclick="clearPath()">Clear</button>
    </div>
    <div id="pf-result"></div>
  </div>
</div>
<svg id="graph"></svg>
<div id="tooltip"></div>
<div id="detail-panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">&times;</button>
    <div id="panel-photo-container"></div>
    <div class="panel-name" id="panel-name"></div>
    <div class="panel-role" id="panel-role"></div>
    <div class="panel-tier" id="panel-tier"></div>
    <div class="panel-mcap" id="panel-mcap"></div>
  </div>
  <div class="panel-section"><div class="panel-section-title">Why They Matter</div><div class="panel-text" id="panel-why"></div></div>
  <div class="panel-section"><div class="panel-section-title">Key Facts &amp; Contributions</div><div class="panel-text" id="panel-facts"></div></div>
  <div class="panel-section"><div class="panel-section-title">Connections</div><ul class="panel-connections" id="panel-connections"></ul></div>
  <div class="panel-section" id="panel-metrics-section">
    <div class="panel-section-title">Key Metrics</div>
    <div class="metrics-grid" id="panel-metrics"></div>
    <div class="conn-bars" id="panel-conn-bars"></div>
  </div>
  <div class="panel-section" id="panel-news-section">
    <div class="panel-section-title">Recent News</div>
    <div id="panel-news"></div>
  </div>
  <div class="panel-section"><div class="panel-section-title">Tags</div><div class="panel-tags" id="panel-tags"></div></div>
</div>
<div id="controls">
  <button class="ctrl-btn" onclick="resetZoom()">Reset View</button>
  <button class="ctrl-btn active" id="btn-labels" onclick="toggleLabels()">Labels: On</button>
  <button class="ctrl-btn active" id="btn-edges" onclick="toggleEdges()">Edges: On</button>
  <button class="ctrl-btn" id="btn-tier" onclick="cycleTierFilter()">All Tiers</button>
  <button class="ctrl-btn" id="btn-view" onclick="cycleViewFilter()">View: All</button>
</div>
<div id="stats"><span id="node-count"></span></div>
<script>
const nodes=[{id:"NVIDIA",label:"NVIDIA",type:"s-company",group:"NVIDIA",tier:"S",mcap:3000,img:"https://upload.wikimedia.org/wikipedia/sco/thumb/2/21/Nvidia_logo.svg/200px-Nvidia_logo.svg.png",role:"GPU & AI Chip Monopoly",why:"Controls ~90% of AI training chip market. Every major AI lab depends on NVIDIA hardware. Jensen Huang turned a gaming GPU company into the backbone of the AI revolution.",facts:"<strong>Market cap:</strong> ~$3T<br><strong>Key products:</strong> H100, B200, GB200 NVL72, CUDA<br><strong>Moat:</strong> CUDA software lock-in — switching costs are enormous<br><strong>Revenue:</strong> Data center went from $15B to $47B+ in one year<br><strong>Supply chain:</strong> 100% dependent on TSMC for fabrication<br><strong>Geopolitical:</strong> US-China chip export controls shaped by NVIDIA dominance",tags:["GPU","Hardware","CUDA","Data Center"]},{id:"Microsoft",label:"Microsoft",type:"s-company",group:"Microsoft",tier:"S",mcap:3100,role:"Largest AI Investor & Deployer",why:"Bet $13B+ on OpenAI and integrated AI across every product. Azure is the cloud backbone for OpenAI. Copilot suite generates $75B+ in AI-adjacent revenue.",facts:"<strong>Market cap:</strong> ~$3.1T<br><strong>OpenAI deal:</strong> $13B+, exclusive cloud provider, 49% profit share<br><strong>Copilot:</strong> GitHub Copilot (1.8M+ devs), M365 Copilot, Windows Copilot<br><strong>Azure AI:</strong> Fastest growing cloud segment<br><strong>Inflection:</strong> Hired Suleyman + team without formal acquisition",tags:["Cloud","Enterprise","Copilot","Azure"]},{id:"Apple",label:"Apple",type:"s-company",group:"Apple",tier:"S",mcap:3500,role:"World's Most Valuable Company",why:"Apple Intelligence brings AI to 2B+ devices. On-device ML strategy is unique. Partnership with OpenAI for Siri. Custom silicon is AI-optimized. Controls the distribution layer.",facts:"<strong>Market cap:</strong> ~$3.5T (most valuable company)<br><strong>Apple Intelligence:</strong> On-device AI for summarization, writing, image gen<br><strong>OpenAI partnership:</strong> ChatGPT integrated into Siri/iOS 18+<br><strong>Custom silicon:</strong> M4 chips with 38 TOPS Neural Engine<br><strong>Privacy:</strong> On-device processing as competitive differentiator<br><strong>TSMC:</strong> Largest TSMC customer by revenue",tags:["Consumer","Hardware","On-Device AI","Privacy","Silicon"]},{id:"Alphabet",label:"Alphabet",type:"s-company",group:"Google",tier:"S",mcap:2200,role:"Google & DeepMind Parent",why:"Invented the Transformer (2017). Owns DeepMind. Gemini models compete at frontier. Google Search, YouTube, Android give unmatched distribution.",facts:"<strong>Market cap:</strong> ~$2.2T<br><strong>Transformer paper:</strong> 'Attention Is All You Need' (2017)<br><strong>Gemini:</strong> Multimodal frontier model<br><strong>TPUs:</strong> Custom AI chips (with Broadcom)<br><strong>Anthropic:</strong> $2B+ investment<br><strong>AI integration:</strong> Search, Gmail, Docs, Android, Pixel",tags:["Search","Cloud","Transformer","Gemini","TPU"]},{id:"DeepMind",label:"DeepMind",type:"s-company",group:"Google",tier:"S",mcap:0,role:"Top AI Research Lab",why:"Most scientifically impactful AI lab. AlphaFold solved a 50-year biology problem. AlphaGo changed public perception of AI. Builds Gemini.",facts:"<strong>Acquired:</strong> Google bought for $500M (2014)<br><strong>AlphaFold:</strong> 200M+ protein structures — Nobel Prize 2024<br><strong>AlphaGo:</strong> Beat world Go champion (2016)<br><strong>Gemini:</strong> Leads development after Google Brain merger<br><strong>Team:</strong> ~3000 researchers",tags:["Research","AlphaFold","Nobel","Gemini"]},{id:"OpenAI",label:"OpenAI",type:"s-company",group:"OpenAI",tier:"S",mcap:500,role:"Leading AI Lab ($500B)",why:"ChatGPT triggered the AI gold rush. GPT-4 set the frontier. Most well-known AI company. Apple partnership extends reach to billions.",facts:"<strong>Valuation:</strong> ~$500B (most valuable startup ever)<br><strong>ChatGPT:</strong> Fastest to 100M users in history<br><strong>Models:</strong> GPT-4, GPT-4o, o1/o3, Sora, DALL-E<br><strong>Board crisis:</strong> Altman fired & rehired Nov 2023<br><strong>Revenue:</strong> ~$12B+ ARR<br><strong>Key exits:</strong> Ilya→SSI, Amodeis→Anthropic, Karpathy",tags:["ChatGPT","GPT-4","Frontier","AGI","API"]},{id:"Anthropic",label:"Anthropic",type:"s-company",group:"Anthropic",tier:"S",mcap:380,role:"AI Safety Leader ($380B)",why:"Founded by ex-OpenAI researchers over safety concerns. Claude models are top-tier. Constitutional AI is unique. $4B Amazon + $2B Google backing.",facts:"<strong>Valuation:</strong> ~$380B<br><strong>Founded:</strong> 2021 by Dario & Daniela Amodei<br><strong>Claude:</strong> 3.5 Sonnet widely considered best coding model<br><strong>Constitutional AI:</strong> Novel alignment technique<br><strong>Funding:</strong> $4B Amazon, $2B Google<br><strong>Revenue:</strong> ~$2B+ ARR",tags:["Claude","Safety","Constitutional AI","Research"]},{id:"Meta",label:"Meta",type:"s-company",group:"Meta",tier:"S",mcap:1600,role:"Open-Source AI Champion",why:"LLaMA made open-source AI viable at frontier scale. $35B+ capex on GPUs. FAIR lab is world-class. Strategy: give away models, profit from ecosystem.",facts:"<strong>Market cap:</strong> ~$1.6T<br><strong>LLaMA:</strong> 3.1 405B best open-weight model<br><strong>GPU spend:</strong> $35B+ capex, 350K+ H100s<br><strong>FAIR:</strong> Led by Yann LeCun since 2013<br><strong>AMD:</strong> Major MI300X customer alongside NVIDIA<br><strong>Users:</strong> AI powers feed/ads/content moderation for 3.9B users",tags:["Open Source","LLaMA","FAIR","Social","Ads"]},{id:"Amazon",label:"Amazon",type:"s-company",group:"Infra",tier:"S",mcap:2100,role:"Cloud + AI Investor",why:"AWS ~30% cloud market. $4B Anthropic investment. Bedrock platform. Trainium/Inferentia custom chips challenge NVIDIA.",facts:"<strong>Market cap:</strong> ~$2.1T<br><strong>AWS:</strong> ~$100B+ annual run rate<br><strong>Anthropic:</strong function nodeRadius(d){if(d.mcap>0){const b=Math.sqrt(d.mcap)*0.55;return Math.max(8,Math.min(b,42));}if(d.tier==="S")return 16;if(d.tier==="A")return 11;return 8;}

const width=window.innerWidth,height=window.innerHeight;
const svg=d3.select("#graph").attr("width",width).attr("height",height);
const defs=svg.append("defs");
const glow=defs.append("filter").attr("id","glow").attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%");
glow.append("feGaussianBlur").attr("stdDeviation","4").attr("result","blur");
const fm=glow.append("feMerge");fm.append("feMergeNode").attr("in","blur");fm.append("feMergeNode").attr("in","SourceGraphic");
Object.entries(edgeColors).forEach(([t,c])=>{defs.append("marker").attr("id","arr-"+t).attr("viewBox","0 0 10 10").attr("refX",20).attr("refY",5).attr("markerWidth",5).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M 0 0 L 10 5 L 0 10 z").attr("fill",c).attr("opacity",0.5);});

const g=svg.append("g");
const zoom=d3.zoom().scaleExtent([0.1,5]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);

const simulation=d3.forceSimulation(nodes)
.force("link",d3.forceLink(links).id(d=>d.id).distance(d=>{if(d.type==="leads")return 50;if(d.type==="compute"||d.type==="funding")return 180;if(d.type==="academic"||d.type==="mentored")return 160;return 140;}).strength(d=>d.type==="leads"?1.5:d.type==="academic"||d.type==="mentored"?0.2:0.3))
.force("charge",d3.forceManyBody().strength(d=>-nodeRadius(d)*25))
.force("center",d3.forceCenter(width/2,height/2))
.force("collision",d3.forceCollide().radius(d=>nodeRadius(d)+6))
.force("x",d3.forceX(width/2).strength(0.02))
.force("y",d3.forceY(height/2).strength(0.02));

const link=g.append("g").selectAll("line").data(links).join("line")
.attr("stroke",d=>edgeColors[d.type]||"#444")
.attr("stroke-width",d=>(d.type==="funding"||d.type==="compute")?1.5:0.8)
.attr("stroke-opacity",0.25)
.attr("stroke-dasharray",d=>d.type==="talent"?"5,3":d.type==="product"?"2,2":d.type==="mentored"?"3,2":"none")
.attr("marker-end",d=>"url(#arr-"+d.type+")");

const linkLabel=g.append("g").selectAll("text").data(links).join("text")
.text(d=>d.label).attr("font-size",6).attr("fill",d=>edgeColors[d.type]||"#444")
.attr("opacity",0).attr("text-anchor","middle").attr("font-family","'JetBrains Mono',monospace");

const node=g.append("g").selectAll("g").data(nodes).join("g")
.call(d3.drag().on("start",ds).on("drag",dr).on("end",de));

node.append("circle").attr("r",d=>nodeRadius(d))
.attr("fill",d=>typeColors[d.type]||"#666")
.attr("stroke",d=>d.tier==="S"?"rgba(255,255,255,0.3)":"none")
.attr("stroke-width",d=>d.tier==="S"?1.5:0)
.attr("opacity",0.85)
.style("filter",d=>d.type==="s-company"&&d.mcap>500?"url(#glow)":"none")
.style("cursor","pointer");

node.filter(d=>d.mcap>=100&&d.type.includes("company")).append("text")
.text(d=>d.mcap>=1000?"$"+(d.mcap/1000).toFixed(1)+"T":"$"+d.mcap+"B")
.attr("text-anchor","middle").attr("dy","0.35em")
.attr("font-size",d=>Math.max(7,nodeRadius(d)*0.3))
.attr("fill","rgba(255,255,255,0.7)")
.attr("font-family","'JetBrains Mono',monospace").attr("font-weight","700")
.style("pointer-events","none");

const labels=node.append("text").text(d=>d.label).attr("text-anchor","middle")
.attr("dy",d=>nodeRadius(d)+11)
.attr("font-size",d=>d.type==="s-company"?9:d.tier==="S"?8:7)
.attr("font-weight",d=>d.tier==="S"?"700":"400")
.attr("fill","#aaa").attr("font-family","'JetBrains Mono',monospace")
.style("pointer-events","none");

const tooltip=d3.select("#tooltip");
node.on("mouseover",function(event,d){
tooltip.style("display","block").html('<div class="tt-name">'+d.label+'</div><div class="tt-sub">'+d.role+'</div><div class="tt-click">&#9658; Click for full details</div>');
d3.select(this).select("circle").transition().duration(150).attr("r",nodeRadius(d)*1.15).attr("opacity",1);
const conn=new Set([d.id]);links.forEach(l=>{if(l.source.id===d.id)conn.add(l.target.id);if(l.target.id===d.id)conn.add(l.source.id);});
link.attr("stroke-opacity",l=>(l.source.id===d.id||l.target.id===d.id)?0.8:0.04).attr("stroke-width",l=>(l.source.id===d.id||l.target.id===d.id)?2.5:0.3);
linkLabel.attr("opacity",l=>(l.source.id===d.id||l.target.id===d.id)?1:0);
node.select("circle").attr("opacity",n=>conn.has(n.id)?1:0.1);
labels.attr("opacity",n=>conn.has(n.id)?1:0.08);
}).on("mousemove",function(event){tooltip.style("left",(event.clientX+14)+"px").style("top",(event.clientY-8)+"px");
}).on("mouseout",function(){tooltip.style("display","none");
d3.select(this).select("circle").transition().duration(150).attr("r",d=>nodeRadius(d));
if(currentPath){highlightPath(currentPath);}else{
node.select("circle").attr("opacity",0.85);
link.attr("stroke-opacity",0.25).attr("stroke-width",d=>(d.type==="funding"||d.type==="compute")?1.5:0.8);
linkLabel.attr("opacity",0);labels.attr("opacity",1);}});

node.on("click",function(event,d){event.stopPropagation();openPanel(d);});

function openPanel(d){
const panel=document.getElementById("detail-panel");
const pc=document.getElementById("panel-photo-container");
const color=typeColors[d.type]||"#888";
if(d.img){pc.innerHTML='<img class="panel-photo '+(d.type.includes("company")||d.type==="startup"||d.type==="university"?"company":"")+'" src="'+d.img+'" onerror="this.outerHTML='\''<div class=panel-initials style=background:'+color+'>'+d.label.split(" ").map(w=>w[0]).join("").slice(0,2)+'</div>'\''">' ;}
else{const ini=d.label.split(" ").map(w=>w[0]).join("").slice(0,2);pc.innerHTML='<div class="panel-initials '+(d.type.includes("company")||d.type==="startup"||d.type==="university"?"company":"")+'" style="background:'+color+'">'+ini+'</div>';}
document.getElementById("panel-name").textContent=d.label;
document.getElementById("panel-role").textContent=d.role||"";
const te=document.getElementById("panel-tier");te.textContent=d.tier+"-Tier";te.style.background=color+"22";te.style.color=color;
const me=document.getElementById("panel-mcap");
if(d.mcap>0){me.textContent=d.mcap>=1000?"Market Cap: ~$"+(d.mcap/1000).toFixed(1)+"T":"Valuation: ~$"+d.mcap+"B";me.style.display="block";}else{me.style.display="none";}
document.getElementById("panel-why").innerHTML=d.why||"";
document.getElementById("panel-facts").innerHTML=d.facts||"";
const cl=document.getElementById("panel-connections");cl.innerHTML="";
links.forEach(l=>{const s=typeof l.source==="object"?l.source.id:l.source;const t=typeof l.target==="object"?l.target.id:l.target;
if(s===d.id||t===d.id){const o=s===d.id?t:s;const dir=s===d.id?"→":"←";const ec=edgeColors[l.type]||"#666";
const li=document.createElement("li");li.innerHTML='<span class="conn-type" style="background:'+ec+'22;color:'+ec+'">'+l.type+'</span> '+dir+' <strong>'+o+'</strong>: '+l.label;cl.appendChild(li);}});
document.getElementById("panel-tags").innerHTML=(d.tags||[]).map(t=>'<span class="panel-tag">'+t+'</span>').join("");
renderMetrics(d.id);
renderNews(d.id);
panel.classList.add("open");}

svg.on("click",()=>closePanel());
function closePanel(){document.getElementById("detail-panel").classList.remove("open");}

simulation.on("tick",()=>{
link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
linkLabel.attr("x",d=>(d.source.x+d.target.x)/2).attr("y",d=>(d.source.y+d.target.y)/2);
node.attr("transform",d=>"translate("+d.x+","+d.y+")");});

function ds(e,d){if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;}
function dr(e,d){d.fx=e.x;d.fy=e.y;}
function de(e,d){if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}
function resetZoom(){svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity);}
let labelsOn=true;function toggleLabels(){labelsOn=!labelsOn;labels.style("display",labelsOn?"block":"none");document.getElementById("btn-labels").textContent="Labels: "+(labelsOn?"On":"Off");document.getElementById("btn-labels").classList.toggle("active",!labelsOn);}
let edgesOn=true;function toggleEdges(){edgesOn=!edgesOn;link.style("display",edgesOn?"block":"none");linkLabel.style("display",edgesOn?"block":"none");document.getElementById("btn-edges").textContent="Edges: "+(edgesOn?"On":"Off");document.getElementById("btn-edges").classList.toggle("active",!edgesOn);}
const tiers=["All","S","A","B"];let tierIdx=0;
function cycleTierFilter(){tierIdx=(tierIdx+1)%tiers.length;const t=tiers[tierIdx];document.getElementById("btn-tier").textContent=t==="All"?"All Tiers":t+"-Tier Only";document.getElementById("btn-tier").classList.toggle("active",t!=="All");node.style("display",d=>(t==="All"||d.tier===t)?"block":"none");link.style("display",l=>{if(!edgesOn)return"none";if(t==="All")return"block";const sT=(typeof l.source==="object"?l.source:nodes.find(n=>n.id===l.source))?.tier;const tT=(typeof l.target==="object"?l.target:nodes.find(n=>n.id===l.target))?.tier;return(sT===t||tT===t)?"block":"none";});}
const views=["All","People","Companies","Academia"];let viewIdx=0;
function cycleViewFilter(){viewIdx=(viewIdx+1)%views.length;const v=views[viewIdx];document.getElementById("btn-view").textContent="View: "+v;document.getElementById("btn-view").classList.toggle("active",v!=="All");node.style("display",d=>{if(v==="All")return"block";if(v==="People")return d.type.includes("person")?"block":"none";if(v==="Companies")return(d.type.includes("company")||d.type==="startup")?"block":"none";if(v==="Academia")return d.type==="university"?"block":"none";return"block";});link.style("display",l=>{if(!edgesOn)return"none";if(v==="All")return"block";const s=typeof l.source==="object"?l.source:nodes.find(n=>n.id===l.source);const t=typeof l.target==="object"?l.target:nodes.find(n=>n.id===l.target);const sOk=s&&(v==="People"?s.type.includes("person"):v==="Companies"?(s.type.includes("company")||s.type==="startup"):v==="Academia"?s.type==="university":true);const tOk=t&&(v==="People"?t.type.includes("person"):v==="Companies"?(t.type.includes("company")||t.type==="startup"):v==="Academia"?t.type==="university":true);return(sOk||tOk)?"block":"none";});}
document.getElementById("search").addEventListener("input",function(){const q=this.value.toLowerCase().trim();if(!q){node.select("circle").attr("opacity",0.85);labels.attr("opacity",1);link.attr("stroke-opacity",0.25);return;}const m=new Set();nodes.forEach(n=>{if(n.label.toLowerCase().includes(q)||n.id.toLowerCase().includes(q)||(n.tags||[]).some(t=>t.toLowerCase().includes(q))||(n.role||"").toLowerCase().includes(q))m.add(n.id);});node.select("circle").attr("opacity",n=>m.has(n.id)?1:0.06);labels.attr("opacity",n=>m.has(n.id)?1:0.04);});

// Path Finder
let pfOpen=true;
function togglePathFinder(){pfOpen=!pfOpen;document.getElementById("pf-body").style.display=pfOpen?"block":"none";document.querySelector(".pf-toggle").textContent=pfOpen?"\u2212":"+";}
function populatePathSelects(){const sorted=[...nodes].sort((a,b)=>a.label.localeCompare(b.label));const opts=sorted.map(n=>`<option value="${n.id}">${n.label}</option>`).join("");document.getElementById("pf-from").innerHTML=opts;document.getElementById("pf-to").innerHTML=opts;document.getElementById("pf-from").value="Geoffrey Hinton";document.getElementById("pf-to").value="Sam Altman";}
function buildAdj(){const adj={};nodes.forEach(n=>adj[n.id]=[]);links.forEach(l=>{const s=typeof l.source==="object"?l.source.id:l.source;const t=typeof l.target==="object"?l.target.id:l.target;if(!adj[s])adj[s]=[];if(!adj[t])adj[t]=[];adj[s].push({to:t,type:l.type,label:l.label});adj[t].push({to:s,type:l.type,label:l.label});});return adj;}
function bfsPath(startId,endId){if(startId===endId)return[startId];const adj=buildAdj();const queue=[[startId]];const visited=new Set([startId]);while(queue.length){const path=queue.shift();const cur=path[path.length-1];for(const nb of(adj[cur]||[])){if(!visited.has(nb.to)){const newPath=[...path,nb.to];if(nb.to===endId)return newPath;visited.add(nb.to);queue.push(newPath);}}}return null;}
let currentPath=null;
function runPathFinder(){const from=document.getElementById("pf-from").value;const to=document.getElementById("pf-to").value;const result=document.getElementById("pf-result");if(!from||!to)return;const path=bfsPath(from,to);currentPath=path;if(!path){result.innerHTML='<div class="pf-no-path">No path found between these nodes.</div>';highlightPath(null);return;}const hops=path.length-1;const chain=path.map((id,i)=>{const n=nodes.find(x=>x.id===id);const label=n?n.label:id;return(i<path.length-1)?`<span class="pf-node-chip" onclick="focusNode('${id}')">${label}</span><span class="pf-hop-arrow">→</span>`:`<span class="pf-node-chip" onclick="focusNode('${id}')">${label}</span>`;}).join("");result.innerHTML=`<div class="pf-path-chain">${chain}</div><div class="pf-summary">${hops} hop${hops!==1?"s":""} &middot; click any node to open details</div>`;highlightPath(path);}
function clearPath(){currentPath=null;document.getElementById("pf-result").innerHTML="";highlightPath(null);}
function highlightPath(pathIds){const pathSet=new Set(pathIds||[]);node.select("circle").attr("opacity",n=>!pathIds?0.85:pathSet.has(n.id)?1:0.08).attr("stroke",n=>pathIds&&pathSet.has(n.id)?"#fff":(n.tier==="S"?"rgba(255,255,255,0.3)":"none")).attr("stroke-width",n=>pathIds&&pathSet.has(n.id)?2.5:(n.tier==="S"?1.5:0));labels.attr("opacity",n=>!pathIds?1:pathSet.has(n.id)?1:0.04);link.attr("stroke-opacity",l=>{if(!pathIds)return 0.25;const s=typeof l.source==="object"?l.source.id:l.source;const t=typeof l.target==="object"?l.target.id:l.target;const onPath=pathIds.some((id,i)=>i<pathIds.length-1&&((id===s&&pathIds[i+1]===t)||(id===t&&pathIds[i+1]===s)));return onPath?0.9:0.04;}).attr("stroke-width",l=>{if(!pathIds)return(l.type==="funding"||l.type==="compute")?1.5:0.8;const s=typeof l.source==="object"?l.source.id:l.source;const t=typeof l.target==="object"?l.target.id:l.target;const onPath=pathIds.some((id,i)=>i<pathIds.length-1&&((id===s&&pathIds[i+1]===t)||(id===t&&pathIds[i+1]===s)));return onPath?3:0.4;});}
function focusNode(id){const n=nodes.find(x=>x.id===id);if(n)openPanel(n);}

// Key Metrics
function computeMetrics(nodeId){let total=0,inDeg=0,outDeg=0,sTierNeighbors=0;const typeCounts={};const neighborIds=new Set();links.forEach(l=>{const s=typeof l.source==="object"?l.source.id:l.source;const t=typeof l.target==="object"?l.target.id:l.target;if(s===nodeId||t===nodeId){total++;typeCounts[l.type]=(typeCounts[l.type]||0)+1;const neighborId=s===nodeId?t:s;neighborIds.add(neighborId);if(s===nodeId)outDeg++;else inDeg++;}});neighborIds.forEach(nid=>{const n=nodes.find(x=>x.id===nid);if(n&&n.tier==="S")sTierNeighbors++;});const centrality=((total/(nodes.length-1))*100).toFixed(1);return{total,inDeg,outDeg,sTierNeighbors,centrality,typeCounts};}
function renderMetrics(nodeId){const m=computeMetrics(nodeId);const grid=document.getElementById("panel-metrics");grid.innerHTML=`<div class="metric-box"><div class="metric-val">${m.total}</div><div class="metric-lbl">Total Links</div></div><div class="metric-box"><div class="metric-val">${m.centrality}%</div><div class="metric-lbl">Degree Centrality</div></div><div class="metric-box"><div class="metric-val">${m.sTierNeighbors}</div><div class="metric-lbl">S-Tier Neighbors</div></div><div class="metric-box"><div class="metric-val">${Object.keys(m.typeCounts).length}</div><div class="metric-lbl">Link Types</div></div>`;const bars=document.getElementById("panel-conn-bars");const maxCount=Math.max(...Object.values(m.typeCounts),1);bars.innerHTML=Object.entries(m.typeCounts).sort((a,b)=>b[1]-a[1]).map(([type,count])=>{const color=edgeColors[type]||"#666";const pct=(count/maxCount*100).toFixed(0);return`<div class="conn-bar-row"><div class="conn-bar-label">${type}</div><div class="conn-bar-track"><div class="conn-bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="conn-bar-count">${count}</div></div>`;}).join("");}

// News Feed
function renderNews(nodeId){const section=document.getElementById("panel-news-section");const container=document.getElementById("panel-news");const items=newsData[nodeId];if(!items||items.length===0){section.style.display="none";return;}section.style.display="block";container.innerHTML=items.map(item=>`<div class="news-item"><div class="news-headline">${item.title}</div><div class="news-meta"><span class="news-source">${item.source}</span><span class="news-date">${item.date}</span><span class="news-tag">${item.tag}</span></div></div>`).join("");}

// Stats and init
const companyCnt=nodes.filter(n=>n.type.includes("company")||n.type==="startup").length;
const peopleCnt=nodes.filter(n=>n.type.includes("person")).length;
const uniCnt=nodes.filter(n=>n.type==="university").length;
document.getElementById("node-count").textContent=nodes.length+" nodes ("+companyCnt+" cos · "+peopleCnt+" people · "+uniCnt+" unis) · "+links.length+" connections";
populatePathSelects();
setTimeout(()=>{svg.transition().duration(1000).call(zoom.transform,d3.zoomIdentity.translate(width*0.05,height*0.05).scale(0.75));},2000);
</script>
